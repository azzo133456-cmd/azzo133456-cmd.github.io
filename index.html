<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>路燈查詢地圖</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- 自己的 CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- AdSense 啟用碼 -->
  <meta name="google-adsense-account" content="ca-pub-4403695228861827">

  <!-- 自動廣告 script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4403695228861827"
        crossorigin="anonymous"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  
</head>

<body>

 <!-- ⭐ 全螢幕首頁（獨立層） -->
  <div id="fullHome">
    <div class="home-title">選擇地區</div>

    <div class="home-buttons">
      <div class="home-btn" onclick="enterMode('home')">主頁</div>
      <div class="home-btn" onclick="enterMode('luzhu')">蘆竹</div>
      <div class="home-btn" onclick="enterMode('yangmei')">楊梅</div>
    </div>
  </div>
  
  <!-- 上方搜尋 UI -->
  <div id="ui">
    <input id="lampInput" type="text" placeholder="輸入路燈編號">
    <button onclick="searchLamp()">查詢</button>
    <select id="favList" style="display:none;">
  <option value="">我的清單</option>
</select>

<button id="delFavBtn" style="display:none;" onclick="deleteFav()">刪除</button>
  </div>

<a href="privacy.html">隱私權政策</a>
  
  <!-- 地圖容器（中間區域） -->
  <div id="mapContainer">
  <div id="map"></div>
  <button id="locateBtn" onclick="locateUser()">📍</button>
</div>

  <!-- 底部廣告區（唯一一個） -->
  <div id="adArea">
    <ins class="adsbygoogle"
         style="display:block;width:100%;height:100%;"
         data-ad-client="ca-pub-4403695228861827"
         data-ad-slot="8678362216"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>

    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>


  <!-- 匯入 Modal -->
  <div id="importModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:10px;padding:24px;width:320px;max-width:90vw;font-family:sans-serif;">
      <h3 style="margin:0 0 16px">匯入路燈資料</h3>
      <p style="font-size:13px;color:#555;margin:0 0 12px">支援格式：路燈/開關箱 Excel（中文欄名）<br>TWD97 X/Y 座標自動轉換經緯度</p>
      <input id="importFile" type="file" accept=".xlsx,.csv" style="width:100%;margin-bottom:12px">
      <input id="importAreas" type="text" placeholder="篩選行政區（選填）例：汐止區,五股區,三重區" style="width:100%;padding:6px;box-sizing:border-box;margin-bottom:12px;border:1px solid #ccc;border-radius:4px;font-size:13px">
      <div style="display:flex;gap:8px">
        <button id="importBtn" onclick="doImport()" style="flex:1;padding:8px;background:#2F4F7F;color:#fff;border:none;border-radius:4px;cursor:pointer">匯入</button>
        <button onclick="document.getElementById('importModal').style.display='none'" style="flex:1;padding:8px;background:#eee;border:none;border-radius:4px;cursor:pointer">取消</button>
      </div>
      <p id="importStatus" style="margin:10px 0 0;font-size:13px;color:#333"></p>
    </div>
  </div>

  <!-- 管理員入口（長按地圖標題 3 秒開啟） -->
  <div id="adminBtn" onclick="openImport()" style="position:fixed;bottom:60px;right:12px;width:36px;height:36px;background:rgba(47,79,127,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;z-index:1000" title="管理員">⚙️</div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- SheetJS（Excel 解析） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="map.js"></script>

</body>
</html>
