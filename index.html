<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>路燈查詢地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2F4F7F" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
</head>

<body>

  <!-- 全螢幕首頁 -->
  <div id="fullHome">
    <div class="home-title">路燈查詢</div>
    <div class="home-buttons">
      <div class="home-btn" onclick="enterMode('home')">全區</div>
      <div class="home-btn" onclick="enterMode('luzhu')">蘆竹</div>
      <div class="home-btn" onclick="enterMode('yangmei')">楊梅</div>
      <div class="home-btn" onclick="enterMode('ymctrl')">楊梅智控器</div>
      <div class="home-btn" onclick="enterMode('tyctrl')">桃園智控器</div>
    </div>
  </div>

  <!-- 上方搜尋列 -->
  <div id="ui">
    <button id="backBtn" onclick="enterMode('fullhome')" style="display:none;padding:8px 10px;border:none;border-radius:20px;background:#EFF3FB;color:#2F4F7F;font-size:18px;cursor:pointer;flex-shrink:0;">←</button>
    <input id="lampInput" type="text" placeholder="路燈編號 / 地址">
    <button id="searchBtn" onclick="searchLamp()">查詢</button>
    <button id="addLocationBtn" onclick="addFromInput()" style="display:none;padding:8px 12px;border:none;border-radius:20px;background:#EFF3FB;color:#2F4F7F;font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;">＋</button>
  </div>

  <!-- 浮動任務清單按鈕 -->
  <button id="taskListBtn" onclick="toggleTaskPanel()">
    清單 <span id="taskCount">0</span>
  </button>

  <!-- 地圖 -->
  <div id="mapContainer">
    <div id="map"></div>
    <button id="locateBtn" onclick="locateUser()">📍</button>
    <button id="northBtn" onclick="resetNorth()" title="重置朝北">🧭</button>
    <div id="visitBanner" style="display:none;"></div>
  </div>

  <!-- 任務清單遮罩 -->
  <div id="taskOverlay" onclick="closeTaskPanel()"></div>

  <!-- 任務清單底部面板 -->
  <div id="taskPanel">
    <div class="panel-handle" id="panelHandle"></div>
    <div class="panel-header">
      <span class="panel-title">任務清單</span>
      <div class="panel-actions">
        <button class="panel-action-btn" onclick="openCustomModal()">自訂＋</button>
        <button class="panel-action-btn" onclick="document.getElementById('batchModal').style.display='flex'">批次＋</button>
        <button id="visitPanelBtn" class="panel-action-btn" onclick="openVisitModal()" style="display:none;">會勘</button>
        <button class="panel-action-btn" onclick="clearAllTasks()" style="background:#fee;color:#c00;">清空</button>
        <button class="panel-action-btn" onclick="closeTaskPanel()" style="font-size:16px;padding:6px 10px;">↓</button>
      </div>
    </div>
    <div id="taskCards"></div>
  </div>

  <!-- 編輯 Modal -->
  <div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:24px;width:300px;max-width:92vw;font-family:sans-serif;">
      <h3 style="margin:0 0 4px;color:#2F4F7F">編輯路燈</h3>
      <p id="editId" style="margin:0 0 14px;font-size:13px;color:#888"></p>
      <label style="font-size:13px;color:#555">地址</label>
      <input id="editAddress" type="text" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px">
      <div style="display:flex;gap:8px">
        <div style="flex:1"><label style="font-size:13px;color:#555">緯度</label>
          <input id="editLat" type="number" step="any" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px"></div>
        <div style="flex:1"><label style="font-size:13px;color:#555">經度</label>
          <input id="editLng" type="number" step="any" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px"></div>
      </div>
      <label style="font-size:13px;color:#555">瓦數（W）</label>
      <input id="editWatt" type="number" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px">
      <label style="font-size:13px;color:#555">色溫（K）</label>
      <input id="editCol" type="number" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 16px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px">
      <div style="display:flex;gap:8px">
        <button onclick="saveEdit()" style="flex:1;padding:10px;background:#2F4F7F;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">儲存</button>
        <button onclick="document.getElementById('editModal').style.display='none'" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:8px;font-size:15px;cursor:pointer">取消</button>
      </div>
      <p id="editStatus" style="margin:10px 0 0;font-size:13px;color:#333"></p>
    </div>
  </div>

  <!-- 匯入 Modal -->
  <div id="importModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:24px;width:320px;max-width:92vw;font-family:sans-serif;">
      <h3 style="margin:0 0 12px;color:#2F4F7F">匯入路燈資料</h3>
      <p style="font-size:13px;color:#555;margin:0 0 12px">支援格式：路燈/開關箱 Excel（中文欄名）<br>TWD97 X/Y 座標自動轉換經緯度</p>
      <input id="importFile" type="file" accept=".xlsx,.csv" style="width:100%;margin-bottom:12px">
      <input id="importAreas" type="text" placeholder="篩選行政區（選填）例：汐止區,五股區" style="width:100%;padding:8px;box-sizing:border-box;margin-bottom:12px;border:1.5px solid #dde3ee;border-radius:8px;font-size:13px">
      <div style="display:flex;gap:8px">
        <button id="importBtn" onclick="doImport()" style="flex:1;padding:10px;background:#2F4F7F;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">匯入</button>
        <button onclick="document.getElementById('importModal').style.display='none'" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:8px;font-size:15px;cursor:pointer">取消</button>
      </div>
      <p id="importStatus" style="margin:10px 0 0;font-size:13px;color:#333"></p>
    </div>
  </div>

  <!-- 批次加入清單 Modal -->
  <div id="batchModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:24px;width:320px;max-width:92vw;font-family:sans-serif;">
      <h3 style="margin:0 0 8px;color:#2F4F7F">批次加入清單</h3>
      <p style="font-size:13px;color:#555;margin:0 0 10px">每行一個路燈編號</p>
      <textarea id="batchIds" rows="7" style="width:100%;padding:8px;box-sizing:border-box;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px;resize:vertical"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="doBatchAdd()" style="flex:1;padding:10px;background:#2F4F7F;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">加入</button>
        <button onclick="document.getElementById('batchModal').style.display='none'" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:8px;font-size:15px;cursor:pointer">取消</button>
      </div>
      <p id="batchStatus" style="margin:10px 0 0;font-size:13px;color:#333"></p>
    </div>
  </div>

  <!-- 會勘排程 Modal -->
  <div id="visitModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:24px;width:320px;max-width:92vw;max-height:80vh;overflow-y:auto;font-family:sans-serif;">
      <h3 style="margin:0 0 12px;color:#2F4F7F">會勘排程</h3>

      <div id="visitList" style="margin-bottom:14px;"></div>

      <div style="border-top:1px solid #f0f0f0;padding-top:12px;">
        <label class="panel-action-btn" style="display:block;text-align:center;cursor:pointer;margin-bottom:8px;">
          📷 上傳公文截圖辨識
          <input id="visitOcrFile" type="file" accept="image/*" style="display:none" onchange="handleVisitOcr(this.files[0])">
        </label>
        <div id="visitPasteZone" tabindex="0" style="border:1.5px dashed #dde3ee;border-radius:8px;padding:10px;text-align:center;font-size:12px;color:#999;cursor:pointer;margin-bottom:10px;">
          點此區塊後按 Ctrl+V 貼上截圖
        </div>
        <p id="visitOcrStatus" style="font-size:12px;color:#999;margin:-4px 0 10px;display:none"></p>
      </div>

      <div style="border-top:1px solid #f0f0f0;padding-top:12px;">
        <label style="font-size:13px;color:#555">地點 / 標籤（必填）</label>
        <input id="visitLabel" type="text" placeholder="例：中山路口、變電箱A" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px">
        <div style="display:flex;gap:8px">
          <div style="flex:1"><label style="font-size:13px;color:#555">日期（必填）</label>
            <input id="visitDate" type="date" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px"></div>
          <div style="flex:1"><label style="font-size:13px;color:#555">時間</label>
            <input id="visitTime" type="time" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px"></div>
        </div>
        <label style="font-size:13px;color:#555">備註</label>
        <textarea id="visitNote" rows="2" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 12px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px;resize:vertical"></textarea>
        <button onclick="addVisit()" style="width:100%;padding:10px;background:#2F4F7F;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">新增排程</button>
      </div>

      <div style="border-top:1px solid #f0f0f0;margin-top:12px;padding-top:12px;">
        <button id="pushSubBtn" onclick="togglePushSubscription()" style="width:100%;padding:9px;background:#EFF3FB;color:#2F4F7F;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">🔔 開啟會勘推播提醒</button>
      </div>

      <button onclick="document.getElementById('visitModal').style.display='none'" style="width:100%;margin-top:12px;padding:10px;background:#f0f0f0;border:none;border-radius:8px;font-size:15px;cursor:pointer">關閉</button>
      <p id="visitStatus" style="margin:10px 0 0;font-size:13px;color:#333"></p>
    </div>
  </div>

  <!-- 自訂地點 Modal -->
  <div id="customModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:24px;width:300px;max-width:92vw;font-family:sans-serif;">
      <h3 style="margin:0 0 14px;color:#2F4F7F">新增自訂地點</h3>
      <label style="font-size:13px;color:#555">名稱（必填）</label>
      <input id="customLabel" type="text" placeholder="例：變電箱A、工作點1" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 12px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px">

      <!-- 座標類型切換 -->
      <div style="display:flex;gap:0;margin-bottom:10px;border:1.5px solid #dde3ee;border-radius:8px;overflow:hidden">
        <button id="coordTabWGS" onclick="switchCoordTab('wgs')"
          style="flex:1;padding:7px 0;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#2F4F7F;color:#fff">經緯度</button>
        <button id="coordTabTAI" onclick="switchCoordTab('tai')"
          style="flex:1;padding:7px 0;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#f0f0f0;color:#555">台電圖號</button>
      </div>

      <!-- WGS84 經緯度 -->
      <div id="coordWGS">
        <p style="font-size:12px;color:#999;margin:0 0 8px">不填會自動用名稱定位</p>
        <div style="display:flex;gap:8px">
          <div style="flex:1"><label style="font-size:13px;color:#555">緯度</label>
            <input id="customLat" type="number" step="any" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px"></div>
          <div style="flex:1"><label style="font-size:13px;color:#555">經度</label>
            <input id="customLng" type="number" step="any" style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:14px"></div>
        </div>
      </div>

      <!-- 台電圖號 -->
      <div id="coordTAI" style="display:none">
        <p style="font-size:12px;color:#999;margin:0 0 8px">例：B0940CC25、Q0445DD41</p>
        <input id="customTaiCode" type="text" placeholder="輸入台電圖號座標"
          style="width:100%;padding:8px;box-sizing:border-box;margin:4px 0 10px;border:1.5px solid #dde3ee;border-radius:8px;font-size:15px;letter-spacing:1px">
      </div>

      <div style="display:flex;gap:8px">
        <button onclick="doAddCustom()" style="flex:1;padding:10px;background:#2F4F7F;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">新增</button>
        <button onclick="document.getElementById('customModal').style.display='none'" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:8px;font-size:15px;cursor:pointer">取消</button>
      </div>
      <p id="customStatus" style="margin:10px 0 0;font-size:13px;color:#333"></p>
    </div>
  </div>

  <!-- 管理員按鈕 -->
  <div id="adminBtn" onclick="openImport()" style="position:fixed;bottom:16px;right:14px;width:36px;height:36px;background:rgba(47,79,127,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;z-index:1000">⚙️</div>

  <a href="privacy.html" style="position:fixed;bottom:20px;left:14px;font-size:11px;color:#aaa;z-index:1000;text-decoration:none">隱私權政策</a>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="map.js?v=49"></script>

</body>
</html>
